<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퇴직연금 플래너 - DB 계산</title>
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/components.css">
</head>
<body class="section-calculators" data-nav="calculators" data-base="../../">
  <main class="content">
    <a class="back-link" href="../../calculators.html">← 계산기 목록</a>
    <div class="card card-header">
      <div class="big-icon">🏢</div>
      <h2 class="color-blue">DB 퇴직금 계산기</h2>
      <p>퇴직 예상 연봉과 성과급 비율을 바탕으로 퇴직금을 계산</p>
    </div>
    <div class="card">
      <h3 style="font-weight:700;margin-bottom:16px">계산 조건 입력</h3>
      <form id="calc-form">
        <div class="form-group">
          <label for="retirementSalary">퇴직 예상 연봉 (만원)</label>
          <input type="number" id="retirementSalary" inputmode="numeric" placeholder="예: 15000">
          <div class="error-msg" id="retirementSalary-error"></div>
        </div>
        <div class="form-group">
          <label for="performanceBonus">퇴직연도 성과급 비율 (%)</label>
          <input type="number" id="performanceBonus" inputmode="numeric" placeholder="예: 50">
          <div class="error-msg" id="performanceBonus-error"></div>
        </div>
        <div class="form-group">
          <label for="yearsOfService">근속연수 (년)</label>
          <input type="number" id="yearsOfService" inputmode="numeric" placeholder="예: 30">
          <div class="error-msg" id="yearsOfService-error"></div>
        </div>
        <button type="submit" class="btn-primary btn-blue">DB 퇴직연금 계산하기</button>
      </form>
    </div>
    <div id="result-area" class="hidden">
      <div class="result-card bg-blue">
        <h3 class="color-blue">🧮 계산 결과</h3>
        <div id="result-content"></div>
      </div>
    </div>
    <div class="warning-card">
      <h3>⚠️ 계산 시 주의사항</h3>
      <p>• 퇴직전 3개월 월급은 동일하며, (연봉 / 12)로 가정
• 성과급은 월 환산하여 적용: (성과급 / 12)
• 비과세소득은 0원으로 가정
• 실제 퇴직금과 상이할 수 있음</p>
    </div>
    <p class="disclaimer">※ 본 계산기는 참고용이며, 실제 세금·연금 수령액과 다를 수 있습니다.</p>
  </main>
  <nav class="bottom-nav" id="bottom-nav"></nav>
  <script src="../../js/utils.js"></script>
  <script src="../../js/tax.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="../../js/calculator-db.js"></script>
</body>
</html>
