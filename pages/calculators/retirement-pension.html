<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퇴직연금 플래너 - 퇴직연금 계산</title>
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/components.css">
</head>
<body class="section-calculators" data-nav="calculators" data-base="../../">
  <main class="content">
    <a class="back-link" href="../../calculators.html">← 계산기 목록</a>
    <div class="card card-header">
      <div class="big-icon">🧮</div>
      <h2 class="color-yellow">퇴직연금 종합 계산기</h2>
      <p>퇴직연금 수령액에 따른 수령 일정과 세금을 계산</p>
    </div>
    <div class="card">
      <h3 style="font-weight:700;margin-bottom:16px">계산 조건 입력</h3>
      <form id="calc-form">
        <div class="form-group">
          <label for="age">연금 개시 나이 (세)</label>
          <input type="number" id="age" inputmode="numeric" placeholder="예: 55">
          <div class="error-msg" id="age-error"></div>
        </div>
        <div class="form-group">
          <label for="retirementAmount">퇴직금 (만원)</label>
          <input type="number" id="retirementAmount" inputmode="numeric" placeholder="예: 50000">
          <div class="error-msg" id="retirementAmount-error"></div>
        </div>
        <div class="form-group">
          <label for="yearsOfService">근속연수 (년)</label>
          <input type="number" id="yearsOfService" inputmode="numeric" placeholder="예: 20">
          <div class="error-msg" id="yearsOfService-error"></div>
        </div>
        <div class="form-group">
          <label for="annualReceipt">연 수령액 (만원)</label>
          <input type="number" id="annualReceipt" inputmode="numeric" placeholder="예: 3000">
          <div class="error-msg" id="annualReceipt-error"></div>
        </div>
        <div class="form-group">
          <label for="investmentReturn">연간 투자수익률 (%)</label>
          <input type="number" id="investmentReturn" inputmode="decimal" step="0.1" placeholder="예: 5.0">
          <div class="error-msg" id="investmentReturn-error"></div>
        </div>
        <button type="submit" class="btn-primary btn-yellow">퇴직연금 계산하기</button>
      </form>
    </div>
    <div id="result-area" class="hidden">
      <div class="result-card bg-yellow">
        <h3>🧮 계산 결과</h3>
        <div id="result-content"></div>
      </div>
    </div>
    <div id="receipt-area" class="hidden card bg-blue">
      <h3 class="color-blue" style="font-weight:700;margin-bottom:12px">퇴직연금 세금 포함 실수령액 계산</h3>
      <div id="receipt-table"></div>
    </div>
    <div class="warning-card">
      <h3>⚠️ 계산 시 주의사항</h3>
      <p>• 금액 지정 연금 수령으로 매년 동일한 금액 수령
• 연초에 퇴직연금 수령 가정
• 퇴직연금 IRP 외 다른 사적연금 없다고 가정
• 비과세소득은 0원으로 가정
• 실제 수령액과 퇴직소득세, 연금소득세 등이 상이할 수 있음</p>
    </div>
    <p class="disclaimer">※ 본 계산기는 참고용이며, 실제 세금·연금 수령액과 다를 수 있습니다.</p>
  </main>
  <nav class="bottom-nav" id="bottom-nav"></nav>
  <script src="../../js/utils.js"></script>
  <script src="../../js/tax.js"></script>
  <script src="../../js/nav.js"></script>
  <script src="../../js/calculator-retirement-pension.js"></script>
</body>
</html>
